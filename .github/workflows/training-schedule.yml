name: Weekly Training Schedule

on:
  push:
    branches:
      - main
    paths:
      - 'update_training_schedule.py'
      - 'test_update_training_schedule.py'
      - '.github/workflows/training-schedule.yml'
  schedule:
    # Sunday 12:00-23:00 KST, once an hour (UTC 03:00-14:00).
    - cron: '0 3-14 * * 0'
  workflow_dispatch:

concurrency:
  group: weekly-training-schedule
  cancel-in-progress: false

jobs:
  update-training-schedule:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install OCR and browser dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-kor
          pip install beautifulsoup4 pillow playwright pytesseract requests
          playwright install --with-deps chromium

      - name: Check latest Naver Cafe schedule
        run: python -m unittest test_update_training_schedule.py

      - name: Update latest Naver Cafe schedule
        run: python update_training_schedule.py

      - name: Commit schedule when changed
        run: |
          if git diff --quiet -- training_schedule.json; then
            echo "No new weekly schedule yet."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add training_schedule.json
          git commit -m "Update weekly training schedule"
          git push
